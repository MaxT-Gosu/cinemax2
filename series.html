<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Series - Cinemax</title>

    <style>
        :root { 
            --bg-color: #141414; 
            --bg-color-alt: #1a1a1a; 
            --accent-color: #E50914; 
            --card-bg: #1a1a1a; 
            --skeleton-bg: #222; 
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{ font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg-color); color: #fff; padding-top: 20px; padding-bottom: 100px; -webkit-tap-highlight-color: transparent;}

        /* ---------- ANIMACIÓN CARGA ---------- */
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .skeleton { 
            background: linear-gradient(90deg, var(--bg-color-alt) 25%, var(--skeleton-bg) 50%, var(--bg-color-alt) 75%); 
            background-size: 200% 100%; 
            animation: shimmer 1.5s infinite; 
        }

        .container { padding: 0 15px; }
        .page-header { margin-bottom: 20px; font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }

        /* ---------- GRID DE CATÁLOGO ---------- */
        .movies-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .movie-card { position: relative; background: var(--skeleton-bg); border-radius: 4px; overflow: hidden; aspect-ratio: 2 / 3; box-shadow: 0 2px 8px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.03); cursor: pointer; transition: transform 0.2s; }
        .movie-card:active { transform: scale(0.95); }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity 0.5s ease; }
        
        .etiqueta-top { position: absolute; top: 5px; right: 5px; background: #000; color: #fff; font-size: 8px; font-weight: 900; padding: 3px 5px; border-radius: 2px; text-transform: uppercase; z-index: 2; border-bottom: 2px solid var(--accent-color); }

        /* BUSCADOR MODAL */
        #modal-busqueda { display: none; position: fixed; inset: 0; background: rgba(20, 20, 20, 0.98); z-index: 3000; padding: 20px; backdrop-filter: blur(15px); overflow-y: auto; }
        .search-box-modal { background: rgba(255,255,255,0.1); border-radius: 4px; display: flex; align-items: center; padding: 12px 15px; margin-top: 40px; margin-bottom: 20px; }
        .search-box-modal input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 16px; }
        .close-search { position: absolute; top: 15px; right: 20px; font-size: 30px; color: #888; cursor: pointer; border: none; background: none; }
        #resultados-busqueda { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        /* MENU INFERIOR */
        .bottom-menu { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.98); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; border-top: 1px solid rgba(255, 255, 255, 0.03); }
        .menu-item { text-decoration: none; color: #888; font-size: 10px; font-weight: 500; display: flex; flex-direction: column; align-items: center; background: none; border: none; cursor: pointer; width: 25%; }
        .menu-item i { font-size: 19px; margin-bottom: 5px; }
        .menu-item.active { color: var(--accent-color); }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div id="modal-busqueda">
    <button class="close-search" onclick="cerrarBuscador()">&times;</button>
    <div class="search-box-modal">
        <i class="fas fa-search" style="margin-right: 15px; color: #888;"></i>
        <input type="text" id="input-buscador" placeholder="Buscar series...">
    </div>
    <div id="resultados-busqueda"></div>
</div>

<div class="container">
    <h2 class="page-header">Catálogo de Series</h2>
    
    <div class="movies-grid" id="movies-grid">
        <div class="movie-card skeleton"></div>
        <div class="movie-card skeleton"></div>
        <div class="movie-card skeleton"></div>
        <div class="movie-card skeleton"></div>
        <div class="movie-card skeleton"></div>
        <div class="movie-card skeleton"></div>
        <div class="movie-card skeleton"></div>
        <div class="movie-card skeleton"></div>
        <div class="movie-card skeleton"></div>
    </div>
</div>

<nav class="bottom-menu">
    <a href="index.html" class="menu-item"><i class="fas fa-home"></i><span>Inicio</span></a>
    <a href="peliculas.html" class="menu-item"><i class="fas fa-film"></i><span>Películas</span></a>
    <a href="series.html" class="menu-item active"><i class="fas fa-tv"></i><span>Series</span></a>
    <button class="menu-item" onclick="abrirBuscador()"><i class="fas fa-search"></i><span>Buscar</span></button>
</nav>

<script src="series.js"></script>

<script>
// --- CARGAR DATOS ---
function cargarCatalogo() {
    const grid = document.getElementById("movies-grid");
    
    if (typeof baseDeSeries === 'undefined' || baseDeSeries.length === 0) {
        grid.innerHTML = "<p style='grid-column: span 3; text-align: center; color: #888;'>No hay series disponibles.</p>";
        return;
    }

    // Generamos el contenido real
    const htmlContent = baseDeSeries.map(s => {
        let tagHtml = s.etiqueta ? `<div class="etiqueta-top">${s.etiqueta}</div>` : '';
        return `
        <div class="movie-card skeleton" onclick="abrirDetalles('${s.id}')">
            ${tagHtml}
            <img src="${s.poster}" onload="imgLoaded(this)" loading="lazy">
        </div>
        `;
    }).join("");

    // Reemplazamos los skeletons iniciales con el contenido generado
    grid.innerHTML = htmlContent;
}

function imgLoaded(img) {
    img.style.opacity = "1";
    // Quitamos el skeleton solo cuando la imagen realmente cargó
    img.parentElement.classList.remove("skeleton");
}

function abrirDetalles(id) {
    let s = baseDeSeries.find(item => item.id === id);
    if(s) {
        localStorage.setItem('peli_id', s.id);
        localStorage.setItem('content_type', 'serie'); 
        window.location.href = "detallesseries.html";
    }
}

// --- BUSCADOR ---
function abrirBuscador() {
    document.getElementById('modal-busqueda').style.display = 'block';
    document.getElementById('input-buscador').focus();
}

function cerrarBuscador() {
    document.getElementById('modal-busqueda').style.display = 'none';
}

document.getElementById('input-buscador').addEventListener('input', (e) => {
    const texto = e.target.value.toLowerCase().trim();
    const resultadosDiv = document.getElementById('resultados-busqueda');
    resultadosDiv.innerHTML = "";

    if (texto.length < 2 || typeof baseDeSeries === 'undefined') return;

    const filtrados = baseDeSeries.filter(s => s.titulo.toLowerCase().includes(texto));

    filtrados.forEach(s => {
        const item = document.createElement('div');
        item.className = 'res-item';
        item.style.cssText = "background:var(--bg-color-alt); border-radius:4px; aspect-ratio:2/3; position:relative; overflow:hidden;";
        item.onclick = () => abrirDetalles(s.id);
        item.innerHTML = `<img src="${s.poster}" style="width:100%; height:100%; object-fit:cover;"><div style="position:absolute; bottom:0; background:rgba(0,0,0,0.8); width:100%; text-align:center; font-size:10px; padding:4px;">${s.titulo}</div>`;
        resultadosDiv.appendChild(item);
    });
});

// Ejecutar inmediatamente
document.addEventListener("DOMContentLoaded", cargarCatalogo);
</script>
</body>
</html>
