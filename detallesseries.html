<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles Serie - Cinemax</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { 
            --bg-color: #141414; 
            --bg-color-alt: #1a1a1a; 
            --accent-color: #E50914; 
            --text-color: #ffffff;
            --text-color-sec: #b3b3b3; 
            --skeleton-bg: #222222; 
        }

        /* --- ESTILOS SKELETON --- */
        .skeleton {
            background: #222;
            background: linear-gradient(110deg, #222 8%, #333 18%, #222 33%);
            border-radius: 4px;
            background-size: 200% 100%;
            animation: 1.5s shine linear infinite;
        }
        @keyframes shine { to { background-position-x: -200%; } }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            padding-bottom: 80px; /* Espacio para el menú inferior */
        }

        .hero {
            position: relative;
            width: 100%;
            height: 60vh;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--bg-color) 5%, transparent 90%);
        }

        .content-container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .serie-info h1 { font-size: 2.5rem; margin: 0 0 10px 0; }
        .meta-data { display: flex; gap: 15px; margin-bottom: 20px; color: var(--text-color-sec); }

        .selector-temporada {
            background: #333;
            color: white;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #444;
            font-size: 1rem;
            margin-bottom: 25px;
            width: 200px;
            cursor: pointer;
        }

        .episodios-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .episodio-card {
            background: var(--bg-color-alt);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
        }

        .episodio-card:hover { transform: scale(1.03); background: #252525; }
        .ep-info { padding: 15px; }
        .ep-info h4 { margin: 0; font-size: 1rem; color: #fff; }

        /* --- MENÚ DE NAVEGACIÓN --- */
        .menu { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(0,0,0,0.98); backdrop-filter: blur(20px); 
            display: flex; justify-content: space-around; padding: 12px 0; 
            border-top: 1px solid rgba(255,255,255,0.03); z-index: 100; 
        }
        .menu-item { 
            color: var(--text-color-sec); text-decoration: none; font-size: 10px; 
            text-align: center; display: flex; flex-direction: column; 
            align-items: center; background: none; border: none; cursor: pointer; width: 25%; font-weight: 500;
        }
        .menu-item i { font-size: 19px; margin-bottom: 5px; opacity: 0.8; }
        .menu-item.active { color: var(--accent-color); }

        /* REPRODUCTOR */
        #player-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            z-index: 5000;
        }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn {
            position: absolute;
            top: 30px; right: 20px;
            font-size: 35px; color: white; cursor: pointer; z-index: 5001;
            background: rgba(0,0,0,0.5); border-radius: 50%; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="hero-bg" class="hero">
        <div class="hero-overlay"></div>
    </div>

    <div class="content-container">
        <div class="serie-info">
            <h1 id="serie-titulo"></h1>
            <div class="meta-data" id="meta-data"></div>
            <p id="serie-descripcion" style="max-width: 800px; line-height: 1.6;"></p>
        </div>

        <select id="season-selector" class="selector-temporada" onchange="cambiarTemporada(this.value)">
        </select>

        <div id="lista-episodios" class="episodios-container"></div>
    </div>

    <nav class="menu">
        <a href="index.html" class="menu-item"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="peliculas.html" class="menu-item"><i class="fas fa-film"></i><span>Películas</span></a>
        <a href="series.html" class="menu-item active"><i class="fas fa-tv"></i><span>Series</span></a>
        <button class="menu-item" onclick="location.href='series.html'"><i class="fas fa-search"></i><span>Buscar</span></button>
    </nav>

    <div id="player-overlay">
        <span class="close-btn" onclick="closePlayer()">&times;</span>
        <iframe id="v-frame" src="" allowfullscreen></iframe>
    </div>

    <script src="series.js"></script>
    <script>
        const idBuscado = localStorage.getItem('peli_id');
        let serieActual = null;

        document.addEventListener("DOMContentLoaded", () => {
            serieActual = baseDeSeries.find(s => s.id === idBuscado);
            if (serieActual) {
                cargarInfo();
                renderTemporadas();
            }
        });

        function cargarInfo() {
            document.getElementById('hero-bg').style.backgroundImage = `url(${serieActual.bg})`;
            document.getElementById('serie-titulo').innerText = serieActual.titulo;
            document.getElementById('serie-descripcion').innerText = serieActual.descripcion;
            document.getElementById('meta-data').innerHTML = `
                <span>${serieActual.fecha}</span>
                <span style="border: 1px solid #555; padding: 0 5px;">${serieActual.calidad}</span>
                <span style="color: #46d369;">${serieActual.coincidencia}</span>
            `;
        }

        function renderTemporadas() {
            const selector = document.getElementById('season-selector');
            selector.innerHTML = '';
            
            serieActual.temporadas.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.numero;
                opt.innerText = `Temporada ${t.numero}`;
                selector.appendChild(opt);
            });

            if(serieActual.temporadas.length > 0) {
                renderEpisodios(serieActual.temporadas[0].numero);
            }
        }

        function cambiarTemporada(num) {
            renderEpisodios(parseInt(num));
        }

        function renderEpisodios(numTemporada) {
            const contenedor = document.getElementById('lista-episodios');
            contenedor.innerHTML = '';

            const temporada = serieActual.temporadas.find(t => t.numero === numTemporada);
            
            if (temporada) {
                temporada.episodios.forEach(ep => {
                    const card = document.createElement('div');
                    card.className = 'episodio-card';
                    card.onclick = () => openPlayer(ep.video);
                    card.innerHTML = `
                        <div class="ep-info">
                            <h4>${ep.ep}. ${ep.titulo}</h4>
                        </div>
                    `;
                    contenedor.appendChild(card);
                });
            }
        }

        function openPlayer(url) {
            if(!url || url === "#") return alert("No disponible");
            document.getElementById('v-frame').src = url;
            document.getElementById('player-overlay').style.display = 'block';
        }

        function closePlayer() {
            document.getElementById('v-frame').src = "";
            document.getElementById('player-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
